<!DOCTYPE html>
<html>
<head>
  <title>Таблица</title>
</head>
<body>
  <table width="600" align="center" border="1" cellpadding="5" cellspacing="0">
    <tr>
      <td width="150" valign="top">Левая колонка, 1 строка</td>
      <td valign="top">Правая колонка, 1 строка</td>
    </tr>
    <tr>
      <td width="150" valign="top">Левая колонка, 2 строка</td>
      <td valign="top">Правая колонка, 2 строка</td>
    </tr>
  </table>

  
  <table width="600" align="center" border="1" cellpadding="4" cellspacing="0">
    <caption><b>Добыча драгоценных камней</b></caption>
    <tr>
      <td></td>
      <td>2010</td>
      <td>2012</td>
      <td>2014</td>
    </tr>
    <tr>
      <td><b>Сапфиры</b></td>
      <td rowspan="2">1483</td>
      <td>4532</td>
      <td>6743</td>
    </tr>
    <tr>
      <td><b>Рубины</b></td>
      <td>3835</td>
      <td>7482</td>
    </tr>
    <tr>
      <td><b>Алмазы</b></td>
      <td>683</td>
      <td colspan="2">238</td>
    </tr>
  </table>

</body>
</html>
