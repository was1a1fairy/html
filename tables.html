<!DOCTYPE html>
<html>
<head>
  <title>Таблица</title>
</head>
<body>
  <table width="600" align="center" border="1" cellpadding="5" cellspacing="0">
    <tr>
      <td width="150" valign="top">Левая колонка, 1 строка</td>
      <td valign="top">Правая колонка, 1 строка</td>
    </tr>
    <tr>
      <td width="150" valign="top">Левая колонка, 2 строка</td>
      <td valign="top">Правая колонка, 2 строка</td>
    </tr>
  </table>
</body>
</html>
